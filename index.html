<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>20</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="stage" id="stage" aria-live="polite">
    <button type="button" class="stage__hit" id="hit" aria-label="Следующее воспоминание">
      <span class="number" id="number">20</span>

    <p class="progress" id="progress" aria-hidden="true"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
